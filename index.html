<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facteur Snakeur</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>Facteur Snakeur 📬</h1>
            <div class="score-board">
                Score: <span id="score">0</span>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="640" height="640"></canvas>
        
        <div id="gameOverScreen" class="hidden overlay">
            <h2>Oh non ! Tournée terminée !</h2>
            <p>Score final: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">Repartir en tournée</button>
        </div>

        <div id="startScreen" class="overlay">
            <h2>Prêt pour la tournée, Niels ?</h2>
            <p>Utilise les flèches directionnelles pour distribuer le courrier !</p>
            <button onclick="startGame()">C'est parti !</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
